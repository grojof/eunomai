name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tools:
    name: tools (typecheck · lint · test · dist freshness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: dist is committed in sync with src
        run: git diff --exit-code dist/cli.cjs

  hooks:
    name: hooks (decide tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --test hooks/decide.test.mjs

  gate:
    name: gate (docs-check · provenance-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tools/dist/cli.cjs docs-check
      - run: node tools/dist/cli.cjs provenance-check
